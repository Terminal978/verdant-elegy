<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verdant Elegy - Заявки на администратора</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🎮 Verdant Elegy</h1>
            <div style="display: flex; align-items: center; gap: 20px;">
                <nav>
                    <a href="index.html">Главная</a>
                    <a href="rules.html">Правила</a>
                    <a href="support.html">Поддержка</a>
                    <a href="https://verdantelegy.trademc.org/" target="_blank">Поддержать проект</a>
                </nav>
                <div class="user-menu">
                    <span id="username-display"></span>
                    <a href="admin.html" style="background: rgba(255,215,0,0.3); padding: 8px 16px; border-radius: 5px; text-decoration: none; color: white;">⚙️ Админ</a>
                    <button id="logout-btn" class="logout-btn">Выйти</button>
                </div>
                <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
                    <span class="theme-toggle-slider"></span>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="admin-section">
            <h2>⚡ Заявки на администратора</h2>
            
            <div class="applications-controls">
                <div class="applications-stats">
                    <div class="stat-badge">
                        <span class="stat-label">Всего заявок:</span>
                        <span class="stat-value" id="total-applications">0</span>
                    </div>
                    <div class="stat-badge">
                        <span class="stat-label">На рассмотрении:</span>
                        <span class="stat-value pending" id="pending-applications">0</span>
                    </div>
                    <div class="stat-badge">
                        <span class="stat-label">Одобрено:</span>
                        <span class="stat-value approved" id="approved-applications">0</span>
                    </div>
                    <div class="stat-badge">
                        <span class="stat-label">Отклонено:</span>
                        <span class="stat-value rejected" id="rejected-applications">0</span>
                    </div>
                </div>
                
                <div class="applications-actions">
                    <button class="toggle-status-btn" id="toggle-status-btn">
                        <span id="status-text">🔴 Закрыть набор</span>
                    </button>
                    <button class="filter-btn active" data-filter="all">Все</button>
                    <button class="filter-btn" data-filter="pending">На рассмотрении</button>
                    <button class="filter-btn" data-filter="approved">Одобрено</button>
                    <button class="filter-btn" data-filter="rejected">Отклонено</button>
                </div>
            </div>

            <div class="applications-list" id="applications-list">
                <!-- Заявки будут добавлены через JavaScript -->
            </div>

            <div class="no-applications" id="no-applications" style="display: none;">
                <div style="font-size: 64px; margin-bottom: 20px;">📭</div>
                <h3>Нет заявок</h3>
                <p>Все заявки на администратора будут отображаться здесь</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Verdant Elegy. Все права защищены.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="applications.js"></script>
</body>
</html>
