<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verdant Elegy - Запросы поддержки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🎮 Verdant Elegy</h1>
            <div style="display: flex; align-items: center; gap: 20px;">
                <nav>
                    <a href="index.html">Главная</a>
                    <a href="rules.html">Правила</a>
                    <a href="support.html">Поддержка</a>
                    <a href="https://verdantelegy.trademc.org/" target="_blank">Поддержать проект</a>
                </nav>
                <div class="user-menu">
                    <span id="username-display"></span>
                    <a href="admin.html" style="background: rgba(255,215,0,0.3); padding: 8px 16px; border-radius: 5px; text-decoration: none; color: white;">⚙️ Админ</a>
                    <button id="logout-btn" class="logout-btn">Выйти</button>
                </div>
                <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
                    <span class="theme-toggle-slider"></span>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="admin-section">
            <h2>📧 Запросы поддержки</h2>
            
            <div class="requests-controls">
                <div class="requests-stats">
                    <div class="stat-badge">
                        <span class="stat-label">Всего запросов:</span>
                        <span class="stat-value" id="total-requests">0</span>
                    </div>
                    <div class="stat-badge">
                        <span class="stat-label">Новые:</span>
                        <span class="stat-value new" id="new-requests">0</span>
                    </div>
                    <div class="stat-badge">
                        <span class="stat-label">Обработанные:</span>
                        <span class="stat-value processed" id="processed-requests">0</span>
                    </div>
                </div>
                <div class="requests-actions">
                    <button class="filter-btn active" data-filter="all">Все</button>
                    <button class="filter-btn" data-filter="new">Новые</button>
                    <button class="filter-btn" data-filter="processed">Обработанные</button>
                    <button class="clear-all-btn" id="clear-all-requests">🗑️ Очистить все</button>
                </div>
            </div>

            <div class="requests-list" id="requests-list">
                <!-- Запросы будут добавлены через JavaScript -->
            </div>

            <div class="no-requests" id="no-requests" style="display: none;">
                <div style="font-size: 64px; margin-bottom: 20px;">📭</div>
                <h3>Нет запросов</h3>
                <p>Все запросы поддержки будут отображаться здесь</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Verdant Elegy. Все права защищены.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="requests.js"></script>
</body>
</html>
